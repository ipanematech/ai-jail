name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: ai-jail-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: ai-jail-macos-aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Run tests
        run: cargo test

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Sign binary (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "::warning::Skipping code signing — no APPLE_CERTIFICATE secret set"
            exit 0
          fi

          # Import certificate to keychain
          echo "$APPLE_CERTIFICATE" | base64 --decode > cert.p12
          KEYCHAIN_PWD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PWD" build.keychain
          security import cert.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PWD" build.keychain
          security list-keychains -d user -s build.keychain login.keychain

          # Sign binary
          codesign --sign "$APPLE_SIGNING_IDENTITY" --options runtime --timestamp \
            target/${{ matrix.target }}/release/ai-jail

          # Notarize
          ditto -c -k target/${{ matrix.target }}/release/ai-jail ai-jail-notarize.zip
          xcrun notarytool submit ai-jail-notarize.zip \
            --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait

          rm -f cert.p12 ai-jail-notarize.zip

      - name: Create tarball
        run: |
          tar czf ${{ matrix.artifact }}.tar.gz \
            -C target/${{ matrix.target }}/release ai-jail

      - name: Compute SHA256
        id: sha
        run: |
          if command -v shasum &>/dev/null; then
            SHA=$(shasum -a 256 ${{ matrix.artifact }}.tar.gz | awk '{print $1}')
          else
            SHA=$(sha256sum ${{ matrix.artifact }}.tar.gz | awk '{print $1}')
          fi
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "$SHA  ${{ matrix.artifact }}.tar.gz" > ${{ matrix.artifact }}.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release body
        run: |
          echo "## Checksums (SHA256)" > body.md
          echo '```' >> body.md
          cat artifacts/*.sha256 >> body.md
          echo '```' >> body.md
          echo "" >> body.md
          echo "## Install" >> body.md
          echo '```bash' >> body.md
          echo "# macOS (Homebrew)" >> body.md
          echo "brew tap ipanematech/ai-jail && brew install ai-jail" >> body.md
          echo "" >> body.md
          echo "# From crates.io" >> body.md
          echo "cargo install ai-jail" >> body.md
          echo "" >> body.md
          echo "# mise" >> body.md
          echo "mise use -g github:ipanematech/ai-jail" >> body.md
          echo '```' >> body.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" artifacts/*.tar.gz artifacts/*.sha256 \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --notes-file body.md \
            --draft

  crates-io:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "::warning::Skipping crates.io publish — no CARGO_REGISTRY_TOKEN secret set"
            exit 0
          fi
          cargo publish

  homebrew:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Homebrew tap
        run: |
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          VERSION="${GITHUB_REF_NAME#v}"
          REVISION="${GITHUB_SHA}"

          git fetch origin "$DEFAULT_BRANCH"
          git checkout "$DEFAULT_BRANCH"

          mkdir -p Formula dist/homebrew
          cat > Formula/ai-jail.rb << FORMULA
          class AiJail < Formula
            desc "Sandbox wrapper for AI coding agents"
            homepage "https://github.com/ipanematech/ai-jail"
            url "https://github.com/ipanematech/ai-jail.git",
                tag: "v${VERSION}",
                revision: "${REVISION}"
            version "${VERSION}"
            license "GPL-3.0-only"

            depends_on "rust" => :build

            on_linux do
              depends_on "bubblewrap"
            end

            def install
              system "cargo", "install", *std_cargo_args(path: ".")
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/ai-jail --version")
            end
          end
          FORMULA

          cp Formula/ai-jail.rb dist/homebrew/ai-jail.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ai-jail.rb dist/homebrew/ai-jail.rb
          git diff --cached --quiet && exit 0
          git commit -m "ai-jail $VERSION"
          git push origin "$DEFAULT_BRANCH"
